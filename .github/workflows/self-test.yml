name: self-test

# Integrity gate for the .claude AI Project OS itself.
# Read-only: validates cross-references, file depth, frontmatter, and JSON.
# No secrets, no network, no writes — safe to run on every PR.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".claude/**"
      - ".cursor/**"
      - ".github/copilot-instructions.md"
      - ".github/instructions/**"
      - ".github/workflows/self-test.yml"

permissions:
  contents: read

jobs:
  integrity:
    name: .claude integrity + lint + adapter sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Integrity check (links, depth, frontmatter, JSON)
        run: python3 .claude/scripts/integrity-check.py
      - name: Lint (schemas, tools allowlist, no-fabrication)
        run: python3 .claude/scripts/validate.py
      - name: Adapters in sync with .claude/ (Cursor + Copilot)
        run: python3 .claude/scripts/generate_adapters.py --check
